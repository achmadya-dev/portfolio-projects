services:
  seaweedfs:
    image: chrislusf/seaweedfs
    ports:
      - "8333:8333"
      - "9333:9333"
      - "8888:8888"
    command: 'server -s3 -s3.port=8333 -filer -volume.max=5'
    volumes:
      - seaweedfs_data:/data
    environment:
      WEED_S3_AUTH_KEY: ${S3_ACCESS_KEY_ID:-minioadmin}
      WEED_S3_AUTH_SECRET: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9333/cluster/status"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  seaweedfs_data:
  redis_data:
